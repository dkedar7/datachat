# Fly.io config for DataChat.
#
# Set the LLM key once:  fly secrets set OPENROUTER_API_KEY=...
#
# A single always-on machine keeps chat history + per-session DataFrames in one
# process. shared-cpu-2x / 2gb gives headroom for pandas + the sandbox subprocess.

app = "datachat"
primary_region = "sjc"

[build]

[env]
  DATACHAT_MODEL = "anthropic/claude-haiku-4.5"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 150
    hard_limit = 200

[[vm]]
  size = "shared-cpu-2x"
  memory = "2gb"
